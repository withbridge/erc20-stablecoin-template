name: Forge Tests

on:
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        network: [ethereum, tempo]

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Add SSH key to checkout private repo
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.ERC20_STABLECOIN_CI_SSH_KEY }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          network: ${{ matrix.network }}
          version: ${{ matrix.network == 'tempo' && 'v1.6.0-t3' || 'stable' }}

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge soldeer install
        run: |
          forge soldeer install
        id: soldeer

      - name: Run Forge build
        run: |
          forge build
        id: build

      - name: Run Forge tests
        run: |
          if [[ "${{ matrix.network }}" == "tempo" ]]; then
            forge test -vv
          else
            forge test --no-match-contract TIP20ControllerTest -vv
          fi
        id: test
